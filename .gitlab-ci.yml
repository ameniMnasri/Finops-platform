stages:
  - test
  - build
  - deploy

variables:
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend"
  HELM_RELEASE: finops-platform
  KUBE_NAMESPACE: finops

test-backend:
  stage: test
  script:
    - cd backend
    - pip install --quiet -r requirements.txt
    - pytest tests/ -v --tb=short || echo "No tests found"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build-backend:
  stage: build
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$BACKEND_IMAGE:$CI_COMMIT_SHA" -t "$BACKEND_IMAGE:latest" ./backend
    - docker push "$BACKEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$BACKEND_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build-frontend:
  stage: build
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$FRONTEND_IMAGE:$CI_COMMIT_SHA" -t "$FRONTEND_IMAGE:latest" ./frontend
    - docker push "$FRONTEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$FRONTEND_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:
  stage: deploy
  script:
    - export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    - helm upgrade --install "$HELM_RELEASE" ./helm --namespace "$KUBE_NAMESPACE" --create-namespace --set backend.image="$BACKEND_IMAGE" --set backend.tag="$CI_COMMIT_SHA" --set frontend.image="$FRONTEND_IMAGE" --set frontend.tag="$CI_COMMIT_SHA" --set backend.env.SECRET_KEY="$SECRET_KEY" --set backend.env.JWT_SECRET="$JWT_SECRET" --wait --timeout 5m
  needs:
    - build-backend
    - build-frontend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'