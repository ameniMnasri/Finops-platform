stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER:      overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  BACKEND_IMAGE:      "$CI_REGISTRY_IMAGE/backend"
  FRONTEND_IMAGE:     "$CI_REGISTRY_IMAGE/frontend"
  HELM_RELEASE:       finops-platform
  KUBE_NAMESPACE:     finops

test-backend:
  stage: test
  image: python:3.11
  script:
    - cd backend
    - pip install --quiet -r requirements.txt
    - pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found - skipping"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

build-backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$BACKEND_IMAGE:$CI_COMMIT_SHA" -t "$BACKEND_IMAGE:latest" ./backend
    - docker push "$BACKEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$BACKEND_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$FRONTEND_IMAGE:$CI_COMMIT_SHA" -t "$FRONTEND_IMAGE:latest" ./frontend
    - docker push "$FRONTEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$FRONTEND_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:
  stage: deploy
  image: alpine/helm:3.14
  before_script:
    - apk add --no-cache curl ca-certificates
    - KUBECTL_VERSION=$(curl -sL https://dl.k8s.io/release/stable.txt)
    - curl -sLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
    - install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
    - kubectl get nodes
  script:
    - |
      helm upgrade --install "$HELM_RELEASE" ./helm \
        --namespace "$KUBE_NAMESPACE" \
        --create-namespace \
        --set backend.image="$BACKEND_IMAGE" \
        --set backend.tag="$CI_COMMIT_SHA" \
        --set frontend.image="$FRONTEND_IMAGE" \
        --set frontend.tag="$CI_COMMIT_SHA" \
        --set backend.env.SECRET_KEY="$SECRET_KEY" \
        --set backend.env.JWT_SECRET="$JWT_SECRET" \
        --wait \
        --timeout 5m \
        --atomic
  environment:
    name: production
    url: http://finops.local
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
