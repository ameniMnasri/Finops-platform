stages:
  - test
  - build
  - deploy

variables:
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend"
  HELM_RELEASE: finops-platform
  KUBE_NAMESPACE: finops

test-backend:
  stage: test
  image: python:3.11
  script:
    - cd backend
    - pip install --quiet -r requirements.txt
    - pytest tests/ -v --tb=short || echo "No tests found"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build-backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$BACKEND_IMAGE:$CI_COMMIT_SHA" -t "$BACKEND_IMAGE:latest" ./backend
    - docker push "$BACKEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$BACKEND_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$FRONTEND_IMAGE:$CI_COMMIT_SHA" -t "$FRONTEND_IMAGE:latest" ./frontend
    - docker push "$FRONTEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$FRONTEND_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:
  stage: deploy
  image: alpine/helm:3.15
  before_script:
    - apk add --no-cache curl ca-certificates bash
    - curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
    - kubectl get nodes
  script:
    - helm upgrade --install finops-platform ./helm --namespace finops --create-namespace --set backend.image="$CI_REGISTRY_IMAGE/backend" --set backend.tag="$CI_COMMIT_SHA" --set frontend.image="$CI_REGISTRY_IMAGE/frontend" --set frontend.tag="$CI_COMMIT_SHA" --set secrets.secretKey="$SECRET_KEY" --set secrets.jwtSecret="$JWT_SECRET" --wait --timeout 5m
  needs:
    - build-backend
    - build-frontend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'