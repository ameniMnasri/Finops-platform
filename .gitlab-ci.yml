include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Security/DAST.gitlab-ci.yml

stages:
  - test
  - security
  - build
  - scan
  - dast
  - deploy

variables:
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend"
  DAST_WEBSITE: "http://finops.local"
  CS_IMAGE: "$CI_REGISTRY_IMAGE/backend:latest"

test-backend:
  stage: test
  image: python:3.11
  script:
    - cd backend
    - pip install --quiet -r requirements.txt
    - pytest tests/ -v --tb=short || echo "No tests found"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

bandit:
  stage: security
  image: python:3.11
  script:
    - pip install bandit safety --quiet
    - echo "=== BANDIT SAST ==="
    - bandit -r backend/app -ll -ii --format txt || true
    - echo "=== SAFETY CVE CHECK ==="
    - safety check -r backend/requirements.txt --output text || true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

trivy-backend:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - echo "=== TRIVY Filesystem Scan ==="
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL --no-progress ./backend
    - echo "=== TRIVY Secret Scan ==="
    - trivy fs --scanners secret --exit-code 0 --no-progress ./backend
    - echo "=== TRIVY Config Scan ==="
    - trivy fs --scanners config --exit-code 0 --no-progress ./helm
  artifacts:
    reports:
      sast: trivy-report.json
    when: always
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build-backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$BACKEND_IMAGE:$CI_COMMIT_SHA" -t "$BACKEND_IMAGE:latest" ./backend
    - docker push "$BACKEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$BACKEND_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$FRONTEND_IMAGE:$CI_COMMIT_SHA" -t "$FRONTEND_IMAGE:latest" ./frontend
    - docker push "$FRONTEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$FRONTEND_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

trivy-image-backend:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --no-progress "$BACKEND_IMAGE:latest"
  needs:
    - build-backend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

trivy-image-frontend:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --no-progress "$FRONTEND_IMAGE:latest"
  needs:
    - build-frontend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:
  stage: deploy
  tags:
    - wsl2-local-runner
  before_script:
    - export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    - kubectl get nodes
  script:
    - helm upgrade --install finops-platform ./helm --namespace finops --set backend.tag=$CI_COMMIT_SHA --set frontend.tag=$CI_COMMIT_SHA --wait --timeout 5m
  needs:
    - build-backend
    - build-frontend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'