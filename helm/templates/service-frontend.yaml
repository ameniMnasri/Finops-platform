apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: {{ .Values.namespace }}
  labels:
    app: frontend
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port:       80
      targetPort: 80
      protocol:   TCP
      name:       http
  selector:
    app: frontend
