# ── Namespace ─────────────────────────────────────────────────────────────────
namespace: finops

# ── Backend ───────────────────────────────────────────────────────────────────
backend:
  image: registry.gitlab.com/amenimnasri8/finops-platform/backend
  tag: latest
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  image: registry.gitlab.com/amenimnasri8/finops-platform/frontend
  tag: latest
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgres:
  image: postgres:16
  database: finops_db
  user: admin
  # Override in production: helm upgrade --set postgres.password=<strong-password>
  # or via CI variable POSTGRES_PASSWORD
  password: admin123
  storage: 5Gi
  port: 5432
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  host: finops.local
  className: nginx

# ── Application secrets ───────────────────────────────────────────────────────
# Override all secrets in production via --set or CI variables.
# Never commit real values here.
secrets:
  secretKey: "change-me-in-production-min-32-chars"
  jwtSecret: "change-me-in-production-min-32-chars"

imagePullSecrets:
  - name: gitlab-registry
