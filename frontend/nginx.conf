server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Proxy /api/ requests to the backend service
    # In Kubernetes the Ingress routes /api/ directly to backend-service.
    # This block is the fallback when the frontend nginx is the gateway
    # (e.g. local Docker testing or direct frontend-service access).
    location /api/ {
        proxy_pass http://backend-service.finops.svc.cluster.local:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Health-check used by the Kubernetes readinessProbe
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # SPA catch-all — serve index.html for any unknown path so
    # client-side routing (React Router) works on hard refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
